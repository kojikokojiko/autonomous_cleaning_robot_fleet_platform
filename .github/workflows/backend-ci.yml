name: Backend Services CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend-services/**"
      - "lambda/**"
  pull_request:
    branches: [main]
    paths:
      - "backend-services/**"
      - "lambda/**"

env:
  AWS_REGION: ap-northeast-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - fleet-service
          - mission-service
          - telemetry-service
          - command-service
          - ota-service

    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: robotops
          POSTGRES_PASSWORD: robotops_dev
          POSTGRES_DB: robotops
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend-services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx
        working-directory: backend-services/${{ matrix.service }}

      - name: Init DB schema
        env:
          PGPASSWORD: robotops_dev
        run: psql -h localhost -U robotops -d robotops -f infrastructure/db/init.sql

      - name: Run tests
        env:
          DATABASE_URL: postgresql://robotops:robotops_dev@localhost:5432/robotops
          REDIS_URL: redis://localhost:6379
          ENV: test
        run: pytest tests/ -v --tb=short
        working-directory: backend-services/${{ matrix.service }}

  build-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - fleet-service
          - mission-service
          - telemetry-service
          - command-service
          - ota-service
          - digital-twin-service

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend-services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/robotops-${{ matrix.service }}:latest
            ${{ env.ECR_REGISTRY }}/robotops-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/robotops-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/robotops-${{ matrix.service }}:buildcache,mode=max

  deploy-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new ECS deployment (rolling)
        run: |
          SERVICES=(fleet-service mission-service telemetry-service command-service ota-service digital-twin-service)
          for svc in "${SERVICES[@]}"; do
            aws ecs update-service \
              --cluster robotops-dev-cluster \
              --service "robotops-dev-${svc}" \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }}
            echo "Triggered rolling deploy: ${svc}"
          done

      - name: Wait for services to stabilize
        run: |
          SERVICES=(fleet-service mission-service telemetry-service command-service ota-service digital-twin-service)
          for svc in "${SERVICES[@]}"; do
            aws ecs wait services-stable \
              --cluster robotops-dev-cluster \
              --services "robotops-dev-${svc}" \
              --region ${{ env.AWS_REGION }}
            echo "Stable: ${svc}"
          done
