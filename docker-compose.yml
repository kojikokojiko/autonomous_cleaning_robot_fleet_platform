version: "3.9"

services:
  # ---- Databases ----
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: robotops
      POSTGRES_PASSWORD: robotops_dev
      POSTGRES_DB: robotops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robotops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- MQTT Broker (local dev, replaces AWS IoT Core) ----
  mqtt-broker:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infrastructure/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  # ---- Backend Services ----
  fleet-service:
    build:
      context: ./backend-services/fleet-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://robotops:robotops_dev@postgres:5432/robotops
      REDIS_URL: redis://redis:6379
      MQTT_BROKER: mqtt-broker
      MQTT_PORT: "1883"
      ENV: development
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend-services/fleet-service:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  mission-service:
    build:
      context: ./backend-services/mission-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://robotops:robotops_dev@postgres:5432/robotops
      REDIS_URL: redis://redis:6379
      FLEET_SERVICE_URL: http://fleet-service:8000
      COMMAND_SERVICE_URL: http://command-service:8000
      ENV: development
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend-services/mission-service:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  telemetry-service:
    build:
      context: ./backend-services/telemetry-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://robotops:robotops_dev@postgres:5432/robotops
      REDIS_URL: redis://redis:6379
      ENV: development
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend-services/telemetry-service:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  command-service:
    build:
      context: ./backend-services/command-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://robotops:robotops_dev@postgres:5432/robotops
      REDIS_URL: redis://redis:6379
      MQTT_BROKER: mqtt-broker
      MQTT_PORT: "1883"
      ENV: development
    ports:
      - "8005:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend-services/command-service:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  ota-service:
    build:
      context: ./backend-services/ota-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://robotops:robotops_dev@postgres:5432/robotops
      REDIS_URL: redis://redis:6379
      S3_BUCKET: robotops-firmware-local
      S3_ENDPOINT: http://localstack:4566
      MQTT_BROKER: mqtt-broker
      MQTT_PORT: "1883"
      ENV: development
    ports:
      - "8006:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend-services/ota-service:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # ---- API Gateway (local, routes to backend services) ----
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - fleet-service
      - mission-service
      - telemetry-service
      - command-service
      - ota-service

  # ---- Dashboard ----
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080/ws
    ports:
      - "3000:3000"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000

  # ---- LocalStack (AWS services emulation) ----
  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3,iot,kinesis,sqs,events
      AWS_DEFAULT_REGION: ap-northeast-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  postgres_data:
  localstack_data:
