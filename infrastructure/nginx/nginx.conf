events {
    worker_connections 1024;
}

http {
    upstream fleet_service {
        server fleet-service:8000;
    }
    upstream mission_service {
        server mission-service:8000;
    }
    upstream telemetry_service {
        server telemetry-service:8000;
    }
    upstream digital_twin_service {
        server digital-twin-service:8000;
    }
    upstream command_service {
        server command-service:8000;
    }
    upstream ota_service {
        server ota-service:8000;
    }

    server {
        listen 80;

        # WebSocket upgrade map
        map $http_upgrade $connection_upgrade {
            default upgrade;
            '' close;
        }

        # Fleet Service
        location /api/v1/robots {
            proxy_pass http://fleet_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Mission Service
        location /api/v1/missions {
            proxy_pass http://mission_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Telemetry Service
        location /api/v1/telemetry {
            proxy_pass http://telemetry_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Digital Twin Service
        location /api/v1/twins {
            proxy_pass http://digital_twin_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Command Service
        location /api/v1/commands {
            proxy_pass http://command_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # OTA Service
        location /api/v1/ota {
            proxy_pass http://ota_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket (command-service handles WS connections locally)
        location /ws {
            proxy_pass http://command_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }
    }
}
